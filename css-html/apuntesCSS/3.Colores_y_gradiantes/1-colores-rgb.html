<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .name{
            color: red;
        }
        .rgb{
            color: rgb(255,0,0); /*R de RED, G de green y B de blue
            La suma de estos da blanco */
        }
        .rgba{
            color: rgba(255,0,0,0.5); /*0 hasta 1 para la transparencia*/
        }
        .rgb_modern{
            color: rgb(100% 0% 0% / 50%); /*Es la forma moderna*/
        }

    </style>
</head>
<body>
    <div class="name">Nombre directo</div>
    <div class="rgb">RGB</div>
    <div class="rgba">RGBA</div>
    <div class="rgb_modern">RGB MODERNO</div>


</body>
</html>
