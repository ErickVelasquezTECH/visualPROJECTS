<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .linear-gradient{
            background: linear-gradient(45deg, red, blue); 
            /*El 45deg es el angulo que tomara todos lo colores, si pones 180 o 360 se veran rectos
            y 45,90 o 270 de diagonal, pero despues del 180º los colores se intercambian*/
        }
        .linear-gradient-to-top{
            background: linear-gradient(to top, red, blue); /*Significa que va hacia arriba, no que 
            empieza desde arriba...*/
        }
        .linear-gradient-to-bottom{
            background: linear-gradient(to bottom, red, blue); /*Va hacia abajo*/
        }
        .linear-gradient-to-left{
            background: linear-gradient(to left, red, blue); /*Va hacia la izquierda*/
        }
        .linear-gradient-to-right{
            background: linear-gradient(to right, red, blue); /*Va hacia la derecha*/
        }
    </style>
</head>
<body>
    <div class="linear-gradient">Gradiante lineal</div><br>
    <div class="linear-gradient-to-top">Gradiante lineal to top</div><br>
    <div class="linear-gradient-to-bottom">Gradiante lineal to bottom</div><br>
    <div class="linear-gradient-to-left">Gradiante lineal to left</div><br>
    <div class="linear-gradient-to-right">Gradiante lineal to right</div>


</body>
</html>
