<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hexadecimal{
            color: #ff0000; /*255 es 111 111(binario) si lo pasamos a hexadecimal es ff*/
        }
        .hexadecimal-short{
            color: #f00; /*Es en formato corto*/
        }
        .hexadecimal-transparency{
            color: #ff000050  /*Agregamos del 1-99 para transparencia*/
        }
    </style>
</head>
<body>
    <div class="hexadecimal">Hexadecimal normal</div>
    <div class="hexadecimal-short">Hexadecimal corto</div>
    <div class="hexadecimal-transparency">Hexadecimal con transparencia</div>
</body>
</html>
