<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .text{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5rem;  /*Tamaño*/
            font-weight: 700;   /*Grosor va de 100-900*/ 
            /*Tambien puede ir normal o bold*/
            font-style: italic; /*Estilo de letra*/
            font-variant:small-caps; /*Lo pone todo en letra mayuscula?¿*/
            line-height: 1.6; /*interlineado*/
            letter-spacing: 0.5px; /*espacio entre letras*/
            word-spacing: 2px; /*espacio entre palabras*/
            text-transform: uppercase; /*Transformacion*/
        }
    </style>
</head>
<body>
    <p class="text">Este es un parrafo</p>
</body>
</html>
