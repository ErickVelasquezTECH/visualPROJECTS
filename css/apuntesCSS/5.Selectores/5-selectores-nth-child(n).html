<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*En este selector significa que eligira al elemento que pongamos de formula:
            -even (pares)
            -odd (impares)
            -n <- ira de 0 a + */
        li:nth-child(even){
            color:aqua;   /*"even" <-- PARES*/
        }
        li:nth-child(odd){
            color:red;   /*"odd" <-- IMPARES*/
        }
        div:nth-child(3n){
            color: aqua;  /*Solamente 3,6,9,.... multiplos de 3.
            Esto porque "N" toma valor de 0,1,2,3...
            3*0=0 ; 3*1=3 ; 3*2=6....*/
        }
        div:nth-child(2n+1){
            color: red;     /*2(0)+1=1 ; 2(1)+1=3....*/
        }
        ::selection{
            background-color:   rgb(225, 255, 0);
        }
    </style>
</head>
<body>
    <p>HAOAOA</p>
    <ul>
        <li>Primero</li>
        <li>Segundo</li>
        <li>Tercero</li>
    </ul>

    <container>
        <div>PRIMERO</div>
        <div>SEGUNDO</div>
        <div>TECERO</div>
        <div>CUARTO</div>
        <div>QUINTO</div>
        <div>SEXTO</div>

    </container>
</body>
</html>
